name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Update Version in Files (from tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Write-Output "Updating version to $version from tag $tag"

          # 1. Update tmkbCompanion.csproj
          $csprojPath = "tmkbCompanion/tmkbCompanion.csproj"
          $csprojContent = Get-Content $csprojPath -Raw
          $csprojContent = $csprojContent -replace '<Version>[^<]+</Version>', "<Version>$version</Version>"
          Set-Content $csprojPath $csprojContent

          # 2. Update installer.iss
          $issPath = "installer.iss"
          $issContent = Get-Content $issPath -Raw
          $issContent = $issContent -replace 'SetupIconFile=.*[\r\n]', "SetupIconFile=tmkbCompanion\Resources\Icons\favicon.ico`r`n"
          $issContent = $issContent -replace 'AppVersion=[^\r\n]+', "AppVersion=$version"
          Set-Content $issPath $issContent

          # 3. Update update.xml
          $xmlPath = "update.xml"
          $xmlContent = Get-Content $xmlPath -Raw
          $xmlContent = $xmlContent -replace '<version>[^<]+</version>', "<version>$version</version>"
          Set-Content $xmlPath $xmlContent

      - name: Commit version updates
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tmkbCompanion/tmkbCompanion.csproj installer.iss update.xml
          git commit -m "Auto-update version files to ${{ github.ref_name }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:master

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore tmkbCompanion/tmkbCompanion.csproj

      - name: Build Release
        run: dotnet build tmkbCompanion/tmkbCompanion.csproj -c Release

      - name: Publish self-contained single-file app
        run: dotnet publish tmkbCompanion/tmkbCompanion.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=false

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss

      - name: Archive published output and installer
        uses: actions/upload-artifact@v7
        with:
          name: tmkbCompanion-windows-x64
          path: tmkbCompanion-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: tmkbCompanion-windows-x64
          path: release-artifact

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release-artifact/tmkbCompanion-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
